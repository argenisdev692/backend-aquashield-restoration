# ============================================================
#  VIDULA · docker-compose.yml
#
#  Services in this stack:
#    - redis  : cache + BullMQ queues + Socket.io adapter (multi-pod ready)
#
#  Postgres is NOT defined here — production data lives on Supabase Cloud.
#  The NestJS app is intended to run on host port 8080 (see APP_PORT env).
#  When you containerize the app, uncomment the `app` service below.
# ============================================================

name: vidula

services:
  redis:
    image: redis:7-alpine
    container_name: vidula-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - "256mb"
      - --maxmemory-policy
      - "allkeys-lru"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - vidula-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL}
    image: vidula-app:local
    container_name: vidula-app
    restart: unless-stopped
    init: true
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "8080"
      # Inside the compose network Redis is reachable via the service name.
      REDIS_URL: "redis://redis:6379"
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      redis:
        condition: service_healthy
    # HTTP health check against @nestjs/terminus endpoint.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - vidula-net

volumes:
  redis-data:
    name: vidula-redis-data

networks:
  vidula-net:
    name: vidula-net
    driver: bridge
